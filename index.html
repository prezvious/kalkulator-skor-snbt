    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Aktifkan mode gelap" title="Aktifkan mode gelap">
        <svg class="icon" viewBox="0 0 256 256" aria-hidden="true">
            <use href="#icon-moon-stars"></use>
        </svg>
    </button>

    <div class="page-shell">
        <main id="main-content" class="app-card">
            <section class="hero-panel">
                <h1>Kalkulator Skor SNBT</h1>
                <p>Hitung prediksi skor UTBK-mu dengan mudah</p>
            </section>

            <section class="calculator-panel" aria-labelledby="calculator-heading">
                <div class="section-heading section-heading--center">
                    <h2 id="calculator-heading">Masukkan jawaban benar</h2>
                </div>

                <form id="score-form" class="score-form" novalidate>
                    <div id="live-region" class="sr-only" aria-live="polite" aria-atomic="true"></div>
                    <div id="subtest-grid" class="subject-grid"></div>

                    <div class="action-bar">
                        <div class="action-buttons">
                            <button id="calculate-btn" class="btn btn-primary" type="submit">
                                <svg class="icon" viewBox="0 0 256 256" aria-hidden="true"><use href="#icon-calculator"></use></svg>
                                <span>Hitung Skor</span>
                            </button>
                            <button id="reset-btn" class="btn btn-secondary" type="button">
                                <svg class="icon" viewBox="0 0 256 256" aria-hidden="true"><use href="#icon-arrow-counter-clockwise"></use></svg>
                                <span>Reset</span>
                            </button>
                        </div>
                    </div>
                </form>
            </section>

            <section id="result" class="results-panel" aria-labelledby="results-title" hidden>
                <div class="results-summary">
                    <div class="results-summary__copy">
                        <h2 id="results-title">Hasil</h2>
                        <p id="summaryBand">Rata-rata skor</p>
                    </div>

                    <div class="results-summary__score-card">
                        <span class="results-summary__score-label">Rata-rata</span>
                        <strong id="averageScore" class="results-summary__score-value">0.00</strong>
                    </div>
                </div>

                <div class="result-highlights" aria-label="Sorotan hasil">
                    <article class="highlight-card">
                        <span class="highlight-card__label">Terisi</span>
                        <strong id="filledCount" class="highlight-card__value">0/7</strong>
                    </article>
                    <article class="highlight-card">
                        <span class="highlight-card__label">Tertinggi</span>
                        <strong id="bestSubtest" class="highlight-card__value">-</strong>
                    </article>
                    <article class="highlight-card">
                        <span class="highlight-card__label">Skor</span>
                        <strong id="bestScore" class="highlight-card__value">0.00</strong>
                    </article>
                </div>

                <div class="results-grid">
                    <section class="scores-panel" aria-labelledby="scores-heading">
                        <div class="section-heading section-heading--compact">
                            <h3 id="scores-heading">Skor per Subtes</h3>
                        </div>
                        <div id="scores" class="scores-grid"></div>
                    </section>

                    <div class="insights-stack">
                        <section class="progress-card" aria-labelledby="progress-title">
                            <div class="section-heading section-heading--compact">
                                <h3 id="progress-title">Progress</h3>
                            </div>

                            <div class="progress-card__value-row">
                                <span class="progress-card__label">Skor</span>
                                <strong id="progressPercentage" class="progress-card__value">0.0%</strong>
                            </div>

                            <div class="progress-meter" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-labelledby="progress-title">
                                <div id="scoreProgress" class="progress-meter__fill"></div>
                            </div>
                        </section>

                        <section id="visualization" class="chart-card" aria-labelledby="visualization-title">
                            <div class="chart-card__header">
                                <div class="section-heading section-heading--compact">
                                    <h3 id="visualization-title">Grafik</h3>
                                </div>

                                <div class="chart-switch" role="group" aria-label="Pilih tipe grafik">
                                    <button class="chart-switch__button is-active" type="button" data-chart-type="bar" aria-pressed="true">Bar</button>
                                    <button class="chart-switch__button" type="button" data-chart-type="radar" aria-pressed="false">Radar</button>
                                </div>
                            </div>

                            <div class="chart-card__canvas-wrap">
                                <canvas id="scoreChart"></canvas>
                            </div>
                        </section>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
